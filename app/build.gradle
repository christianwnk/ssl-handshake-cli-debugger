plugins {
    id 'java'
    id 'com.gradleup.shadow' version '8.3.5'
}

version = '0.2'

repositories {
    mavenCentral()
}

dependencies {
    implementation libs.picocli

    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

jar {
    manifest {
        attributes 'Main-Class': 'net.cwnk.ssldebugger.SslDebuggerCli'
    }
}

shadowJar {
    archiveBaseName = 'ssl-handshake-debugger'
    archiveClassifier = ''
    archiveVersion = ''
    mergeServiceFiles()
    manifest {
        attributes 'Main-Class': 'net.cwnk.ssldebugger.SslDebuggerCli'
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
